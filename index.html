<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpaceX Upcoming Launches</title>
<style>
  body {
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  h1 {
    text-align: center;
    padding: 20px 0;
    font-size: 2.5em;
  }
  #launchList {
    position: relative;
    width: 100%;
  }
  .launch {
    text-align: center;
    font-size: 1.5em;
    padding: 10px 0;
    border-bottom: 1px solid white;
  }
</style>
</head>
<body>
<h1>Upcoming SpaceX Launches</h1>
<div id="launchList"></div>

<script>
// Fetch upcoming launches from SpaceX API
async function fetchLaunches() {
    const res = await fetch('https://api.spacexdata.com/v4/launches/upcoming');
    let launches = await res.json();
    launches.sort((a,b) => new Date(a.date_utc) - new Date(b.date_utc));
    return launches;
}

// Build and auto-scroll the list
async function buildList() {
    const launches = await fetchLaunches();
    const list = document.getElementById('launchList');
    
    // Create launch elements
    launches.forEach(launch => {
        const div = document.createElement('div');
        div.className = 'launch';
        div.textContent = `${launch.name} - ${new Date(launch.date_utc).toLocaleString()}`;
        list.appendChild(div);
    });

    // Auto-scroll
    let scrollPos = 0;
    const totalHeight = list.scrollHeight;
    const speed = 0.5; // pixels per frame
    function scroll() {
        scrollPos += speed;
        if(scrollPos > totalHeight) scrollPos = 0;
        list.style.transform = `translateY(-${scrollPos}px)`;
        requestAnimationFrame(scroll);
    }
    scroll();

    // Auto-update every 10 minutes
    setInterval(async () => {
        list.innerHTML = '';
        const newLaunches = await fetchLaunches();
        newLaunches.forEach(launch => {
            const div = document.createElement('div');
            div.className = 'launch';
            div.textContent = `${launch.name} - ${new Date(launch.date_utc).toLocaleString()}`;
            list.appendChild(div);
        });
    }, 10*60*1000); // 10 minutes
}

buildList();
</script>
</body>
</html>
