<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpaceX Upcoming Launches</title>
<style>
  body {
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  h1 {
    text-align: center;
    padding: 20px 0;
    font-size: 2.4em;
  }
  #launchWrapper {
    height: calc(100vh - 80px);
    overflow: hidden;
    position: relative;
  }
  .launchList {
    position: absolute;
    width: 100%;
  }
  .launch {
    text-align: center;
    font-size: 1.5em;
    padding: 12px 0;
    border-bottom: 1px solid white;
  }
</style>
</head>
<body>
<h1>Upcoming SpaceX Launches</h1>
<div id="launchWrapper">
  <div id="launchList" class="launchList"></div>
</div>

<script>
// Fetch upcoming launches from SpaceX API
async function fetchLaunches() {
    try {
        const res = await fetch('https://api.spacexdata.com/v4/launches/upcoming');
        const launches = await res.json();
        // Only keep future ones and sort them
        const future = launches
            .filter(l => new Date(l.date_utc) > new Date())
            .sort((a, b) => new Date(a.date_utc) - new Date(b.date_utc));
        return future;
    } catch (e) {
        console.error("Error fetching launches:", e);
        return [];
    }
}

// Build the scrolling list
async function buildList() {
    const data = await fetchLaunches();
    const list = document.getElementById('launchList');
    list.innerHTML = '';

    if (data.length === 0) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'launch';
        errorDiv.textContent = "No upcoming launches available right now";
        list.appendChild(errorDiv);
        return;
    }

    data.forEach(launch => {
        const div = document.createElement('div');
        div.className = 'launch';
        const launchTime = new Date(launch.date_utc).toLocaleString();
        div.textContent = `${launch.name} – ${launchTime}`;
        list.appendChild(div);
    });

    // Remove old clone if exists
    const oldClone = document.getElementById('launchListClone');
    if (oldClone) oldClone.remove();

    // Duplicate list for smooth scrolling
    const clone = list.cloneNode(true);
    clone.id = 'launchListClone';
    list.appendChild(clone);

    autoScroll();
}

// Smooth infinite scroll
function autoScroll() {
    const list = document.getElementById('launchList');
    let pos = 0;
    const speed = 0.6;

    function scroll() {
        pos += speed;
        const halfHeight = list.scrollHeight / 2;
        if (pos >= halfHeight) pos = 0;
        list.style.transform = `translateY(-${pos}px)`;
        requestAnimationFrame(scroll);
    }
    scroll();
}

// Refresh list every 10 minutes
setInterval(buildList, 10 * 60 * 1000);

// Initial load
buildList();
</script>
</body>
</html>
