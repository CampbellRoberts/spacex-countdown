<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpaceX Upcoming Launches</title>
<style>
  body {
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  h1 {
    text-align: center;
    padding: 20px 0;
    font-size: 2.5em;
  }
  #launchWrapper {
    height: calc(100vh - 80px);
    overflow: hidden;
    position: relative;
  }
  #launchList, #launchListClone {
    position: absolute;
    width: 100%;
  }
  .launch {
    text-align: center;
    font-size: 1.5em;
    padding: 15px 0;
    border-bottom: 1px solid white;
  }
</style>
</head>
<body>
<h1>Upcoming SpaceX Launches</h1>
<div id="launchWrapper">
  <div id="launchList"></div>
</div>

<script>
// Fetch upcoming launches
async function fetchLaunches() {
    try {
        const res = await fetch('https://api.spacexdata.com/v4/launches/upcoming');
        let launches = await res.json();
        // Filter out past launches just in case
        launches = launches.filter(l => new Date(l.date_utc) > new Date());
        // Sort by date ascending
        launches.sort((a,b) => new Date(a.date_utc) - new Date(b.date_utc));
        return launches;
    } catch(e) {
        console.error("Failed to fetch SpaceX launches:", e);
        return [];
    }
}

// Build the scrolling list
async function buildList() {
    const launches = await fetchLaunches();
    const list = document.getElementById('launchList');
    list.innerHTML = ''; // clear previous content

    // If API returns empty, use fallback placeholder launches
    const fallback = [
        {name:"Starlink 1", date_utc: new Date(Date.now() + 3600*1000).toISOString()},
        {name:"Starship Test", date_utc: new Date(Date.now() + 7200*1000).toISOString()}
    ];
    const data = launches.length ? launches : fallback;

    // Create list items
    data.forEach(launch => {
        const div = document.createElement('div');
        div.className = 'launch';
        const date = new Date(launch.date_utc);
        div.textContent = `${launch.name} - ${date.toLocaleString()}`;
        list.appendChild(div);
    });

    // Remove old clone if exists
    const oldClone = document.getElementById('launchListClone');
    if(oldClone) oldClone.remove();

    // Duplicate for seamless scrolling
    const listClone = list.cloneNode(true);
    listClone.id = 'launchListClone';
    list.appendChild(listClone);

    autoScroll();
}

// Smooth scrolling
function autoScroll() {
    const list = document.getElementById('launchList');
    let pos = 0;
    const speed = 0.5; // pixels per frame

    function scroll() {
        pos += speed;
        const halfHeight = list.scrollHeight / 2;
        if(pos >= halfHeight) pos = 0;
        list.style.transform = `translateY(-${pos}px)`;
        requestAnimationFrame(scroll);
    }
    scroll();
}

// Auto-update every 10 minutes
setInterval(buildList, 10*60*1000);

// Initial load
buildList();
</script>
</body>
</html>
